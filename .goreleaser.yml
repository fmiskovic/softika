version: 2

builds:
  - main: ./cmd/softika
    binary: softika
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

brews:
  - repository:
      owner: fmiskovic
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    homepage: https://github.com/fmiskovic/softika
    description: Analyze GitHub repos for fake traction
    license: AGPL-3.0

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - '^test:'
